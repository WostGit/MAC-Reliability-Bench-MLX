name: MAC-Reliability-Bench - MLX on macOS 26

on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        description: 'Teacher model (mlx-community)'
        required: false
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        description: 'Student model (mlx-community)'
        required: false
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'
      num_runs:
        description: 'Runs per task'
        required: false
        default: '5'
      max_turns:
        description: 'Max agent turns per run'
        required: false
        default: '12'

jobs:
  benchmark:
    runs-on: macos-26
    timeout-minutes: 150

    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx-lm pyyaml pytest requests rich tabulate

      - name: 🔧 Cache MLX models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: mlx-qwen25-${{ inputs.model_teacher_hf }}-${{ inputs.model_student_hf }}

      - name: 📁 Setup Benchmark + Tasks + Agent
        shell: bash
        run: |
          mkdir -p benchmark/tasks/task_{1..8} benchmark/results

          cat > benchmark/agent_mlx.py << 'AGENTEOF'
          import subprocess
          import json
          import re
          from pathlib import Path
          import time
          from typing import Dict, List
          from mlx_lm import load, generate

          models_cache = {}

          def get_model(model_id: str):
              if model_id not in models_cache:
                  print(f"Loading {model_id} ...")
                  models_cache[model_id] = load(model_id)
              return models_cache[model_id]

          def query_model(model_id: str, prompt: str, temperature: float = 0.7) -> str:
              model, tokenizer = get_model(model_id)
              response = generate(model, tokenizer, prompt=prompt, max_tokens=2048, temperature=temperature, verbose=False)
              return response

          def run_command(cmd: str, cwd: Path) -> Dict:
              try:
                  r = subprocess.run(cmd, shell=True, cwd=cwd, capture_output=True, text=True, timeout=20)
                  return {"success": r.returncode == 0, "output": r.stdout + r.stderr}
              except Exception as e:
                  return {"success": False, "output": str(e)}

          def build_prompt(issue: str, repo_path: Path, history: List) -> str:
              py_files = list(repo_path.glob("**/*.py"))[:5]
              context = "\n\n".join([f"### {f.name}\n{f.read_text()}" for f in py_files])
              hist = "\n".join([f"Turn {h['turn']}: {h.get('action')}" for h in history[-5:]]) or "None"
              return f"""You are a precise coding agent. Fix the issue using the tools.
          ISSUE: {issue}
          CODEBASE:
          {context}
          HISTORY:
          {hist}
          Reply with ONLY valid JSON:
          {{
            "thinking": "step by step reasoning",
            "action": "edit|test|submit",
            "target_file": "main.py",
            "content": "full file content if edit"
          }}
          """

          def parse_response(text: str) -> Dict:
              try:
                  match = re.search(r'\{.*\}', text, re.DOTALL)
                  return json.loads(match.group(0)) if match else json.loads(text)
              except:
                  return {"action": "error", "thinking": "parse failed"}

          def run_agent(model_id: str, issue_desc: str, repo_path: Path, max_turns: int = 12) -> Dict:
              history = []
              start = time.time()
              for turn in range(max_turns):
                  prompt = build_prompt(issue_desc, repo_path, history)
                  resp = query_model(model_id, prompt)
                  action = parse_response(resp)
                  history.append({"turn": turn, "action": action.get("action"), "thinking": action.get("thinking","")})
                  if action.get("action") == "edit" and action.get("content"):
                      (repo_path / action["target_file"]).write_text(action["content"])
                  elif action.get("action") in ("test", "run_tests"):
                      res = run_command("python -m pytest -q", repo_path)
                      if res["success"]:
                          return {"success": True, "turns": turn+1, "time": time.time()-start, "history": history}
                  elif action.get("action") == "submit":
                      res = run_command("python -m pytest --tb=no", repo_path)
                      return {"success": res["success"], "turns": turn+1, "time": time.time()-start, "history": history}
                  time.sleep(0.3)
              final = run_command("python -m pytest --tb=no", repo_path)
              return {"success": final["success"], "turns": max_turns, "time": time.time()-start, "history": history, "reason": "max_turns"}

          print("Agent ready")
          AGENTEOF

          for i in {1..8}; do
            mkdir -p "benchmark/tasks/task_$i"
            cat > "benchmark/tasks/task_$i/README.md" << EOT
          Task $i: Fix the code so all tests pass.
          EOT
            cat > "benchmark/tasks/task_$i/main.py" << EOF
          def compute(x):
              return x * 2   # Buggy placeholder
          EOF
            cat > "benchmark/tasks/task_$i/test_main.py" << EOF
          from main import compute
          def test_compute():
              assert compute(5) == 10
              assert compute(0) == 0
              assert compute(-4) == -8
          EOF
          done
          echo "✅ Setup complete - 8 tasks ready"

      - name: 🧪 Run MAC-Reliability Benchmark (MLX)
        run: |
          python - << 'PYCODE'
          import sys
          import json
          from pathlib import Path
          from datetime import datetime
          from rich.console import Console
          import importlib.util

          console = Console()
          spec = importlib.util.spec_from_file_location("agent", "benchmark/agent_mlx.py")
          agent = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(agent)

          models = ["${{ inputs.model_teacher_hf }}", "${{ inputs.model_student_hf }}"]
          tasks = sorted(Path("benchmark/tasks").glob("task_*"))
          num_runs = int("${{ inputs.num_runs }}")
          max_turns = int("${{ inputs.max_turns }}")

          all_results = {}

          for model_id in models:
              console.rule(f"[bold red]Testing {model_id}[/]")
              all_results[model_id] = {}
              for task_path in tasks:
                  console.print(f"[cyan]→ {task_path.name}[/]")
                  task_results = []
                  issue = (task_path / "README.md").read_text()
                  for r in range(num_runs):
                      console.print(f"    Run {r+1}/{num_runs} ... ", end="")
                      result = agent.run_agent(model_id, issue, task_path, max_turns)
                      task_results.append(result)
                      status = "[green]PASS[/]" if result["success"] else "[red]FAIL[/]"
                      console.print(status)
                  all_results[model_id][task_path.name] = task_results

          results_dir = Path("benchmark/results")
          results_dir.mkdir(exist_ok=True)
          report = {
              "timestamp": datetime.now().isoformat(),
              "runner": "macos-26 + MLX",
              "models": models,
              "num_runs": num_runs,
              "results": all_results
          }
          (results_dir / "full_report.json").write_text(json.dumps(report, indent=2))

          with open(results_dir / "report.md", "w") as f:
              f.write("# MAC-Reliability Benchmark Report\n\n")
              f.write(f"Generated on: {datetime.now()}\n\n")
              for model, data in all_results.items():
                  total = sum(1 for runs in data.values() for run in runs if run["success"])
                  attempts = len(data) * num_runs
                  rate = (total / attempts * 100) if attempts > 0 else 0
                  f.write(f"## {model}\n")
                  f.write(f"**Success Rate**: {rate:.1f}% ({total}/{attempts})\n\n")

          console.print("[bold green]✅ Benchmark completed successfully![/]")
          PYCODE

      - name: 📊 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: mac-reliability-results
          path: benchmark/results/
          retention-days: 30

      - name: 📋 Show Summary
        run: cat benchmark/results/report.md
